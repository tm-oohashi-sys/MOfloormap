<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>フロアマップ（レイアウトDB版）</title>
<style>
:root{--bg:#0f141b;--sel:#141a23;--panel:#1d2530;--panel-2:#232c39;--line:#2b3543;--text:#eef2f7;--muted:#93a0b3;--gold:#e8b84b;font-synthesis:none}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.16,.84,.44,1);background:var(--bg)}
#screenMap{transform:translateX(100%);--mapbg:#0f141b}#screenMap.on{transform:translateX(0)}#screenMap.lightbg{--mapbg:#ffffff}
#screenSelect{background:var(--sel)}
.s-head{padding:16px 18px 6px}
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.s-head .brand{display:inline-flex;align-items:baseline;gap:9px;cursor:default;border:none;background:none;padding:0}
.top-btn{flex:none;background:var(--gold);border:none;color:#10131a;font-size:13px;font-weight:800;padding:8px 16px;border-radius:999px;cursor:pointer;letter-spacing:.02em}
.top-btn:active{filter:brightness(.92)}
.top-btn:active{background:var(--panel)}
.s-head .mark{font-weight:800;font-size:20px;color:var(--gold);letter-spacing:.04em}.s-head .sub{font-size:11px;color:var(--muted);letter-spacing:.16em}
.s-head .store{font-size:13px;color:var(--text);margin-top:7px;font-weight:600}
.s-head .lead{font-size:12px;color:var(--muted);margin-top:3px}
.s-body{flex:1;overflow-y:auto;padding:6px 16px 28px;-webkit-overflow-scrolling:touch}
.lab{font-size:13px;font-weight:800;margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
.lab .n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--gold);color:#10131a;font-size:13px;font-weight:800}
.rates{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.rbtn{position:relative;padding:18px 16px;border-radius:15px;border:none;cursor:pointer;color:#10131a;text-align:left;box-shadow:0 4px 14px rgba(0,0,0,.35)}
.rbtn .rl{font-weight:800;font-size:22px}.rbtn .rk{display:block;font-size:12px;font-weight:700;opacity:.85;margin-top:2px}
.rbtn .rc{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:800;color:#10131a;background:#fff;padding:5px 11px;border-radius:999px;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.rbtn.sel{outline:3px solid #fff;outline-offset:-1px}
.pk-filter{width:100%;height:44px;padding:0 14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--text);font-size:16px;outline:none;margin-bottom:10px}
.pk-filter:focus{border-color:var(--gold)}
.mrow{display:flex;align-items:center;gap:10px;padding:14px 14px;border-radius:12px;background:var(--panel);margin-bottom:8px;cursor:pointer;border:1px solid transparent}
.mrow:active{background:var(--panel-2)}.mrow.sel{border-color:var(--gold)}
.mrow .swatch{width:8px;height:30px;border-radius:4px;flex:none}
.mrow .mn{flex:1;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow .mc{font-size:13px;color:var(--muted);white-space:nowrap}.mrow .chev{color:var(--muted);font-size:18px}
.nos{display:flex;flex-wrap:wrap;gap:10px}
.nochip{min-width:64px;text-align:center;padding:15px 12px;border-radius:13px;background:var(--panel);border:1.5px solid var(--line);font-weight:800;font-size:18px;cursor:pointer;color:var(--text)}
.nochip:active{background:var(--gold);color:#10131a;border-color:var(--gold)}
.pk-empty{color:var(--muted);font-size:14px;padding:10px 2px}.hint{font-size:12px;color:var(--muted);margin:6px 2px 0}
.copyright{text-align:center;color:var(--muted);font-size:10.5px;padding:14px 0 6px;opacity:.7}
.admin{margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
.admin .at{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.08em;margin-bottom:9px}
.abtn{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);color:var(--text);height:42px;padding:0 15px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;margin:0 8px 8px 0}
.abtn:active{background:var(--panel-2)}.abtn.gold{background:var(--gold);color:#10131a;border-color:var(--gold)}
.amsg{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;line-height:1.5}
.map-head{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:#1b232e;z-index:5}
.home{display:flex;align-items:center;gap:6px;background:var(--gold);border:none;color:#10131a;height:40px;padding:0 15px;border-radius:11px;font-size:15px;font-weight:800;cursor:pointer;flex:none;letter-spacing:.03em}
.mh-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px;overflow:hidden}
.rate-pill{font-size:12px;font-weight:800;padding:4px 10px;border-radius:8px;color:#10131a;white-space:nowrap;flex:none}
.mh-name{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;white-space:nowrap}
.mh-name .mqtrack{display:inline-block;white-space:nowrap;will-change:transform}
.mh-name .mqtrack>span{display:inline-block;padding-right:46px}
@keyframes mqflow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mh-no{font-size:13px;color:var(--muted);white-space:nowrap;flex:none}
.mh-spec{flex:none;text-decoration:none;background:var(--panel);border:1px solid var(--line);color:var(--text);font-weight:800;font-size:13px;padding:9px 13px;border-radius:10px}
main{flex:1;position:relative;overflow:hidden;background:var(--mapbg)}
#stage{position:absolute;inset:0;overflow:hidden;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;background:var(--mapbg)}#stage.grabbing{cursor:grabbing}
#mapwrap{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
#overlay{position:absolute;left:0;top:0;overflow:visible;background:var(--mapbg)}
.machine{stroke:#fff;stroke-width:.5}
.machine.target{stroke:#10131a;stroke-width:1.2}
.machine.mhl{stroke:#7d8794;stroke-width:.7}
.hl-box{fill:none;stroke:#ffce2e;stroke-width:2.4;paint-order:stroke;filter:drop-shadow(0 0 2.5px rgba(255,190,20,.95))}
.hl-pulse{fill:none;stroke:#ffce2e;stroke-width:1.6;opacity:.75;transform-box:fill-box;transform-origin:center;animation:hlp 1.15s ease-out infinite;pointer-events:none}
@keyframes hlp{0%{opacity:.75;transform:scale(1)}100%{opacity:0;transform:scale(3.2)}}
.fac-label{text-anchor:middle;font-weight:800;pointer-events:none}
.new-outline{stroke:#22c55e;stroke-width:1.9;pointer-events:none}
.new-lab{color:#22c55e}
.nochip{position:relative}
.nochip.new::after{content:'';position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px #10131a}
.zoom{position:absolute;right:12px;bottom:14px;z-index:6;display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:11px;overflow:hidden;border:1px solid var(--line)}
.zoom button{width:42px;height:42px;border:none;background:var(--panel);color:var(--text);font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.zoom button:active{background:var(--gold);color:#10131a}
.home-fab{position:absolute;left:12px;bottom:14px;z-index:6;display:flex;align-items:center;gap:6px;background:var(--gold);color:#10131a;border:none;border-radius:11px;height:42px;padding:0 16px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.marker{position:absolute;z-index:7;transform:translate(-50%,-100%);pointer-events:none}
.marker .pin{position:relative;width:30px;height:30px;border-radius:50% 50% 50% 0;background:#10131a;transform:rotate(-45deg);box-shadow:0 0 0 5px rgba(255,255,255,.7),0 0 0 8px rgba(16,19,26,.35),0 6px 16px rgba(0,0,0,.5);margin:0 auto}
.marker .pin::after{content:"";position:absolute;left:50%;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
.marker .ring{position:absolute;left:50%;bottom:-4px;width:24px;height:24px;border-radius:50%;background:rgba(16,19,26,.45);transform:translate(-50%,0);animation:mpulse 1.1s ease-out infinite}
.marker .tag{position:absolute;left:50%;top:-34px;transform:translateX(-50%);background:#10131a;color:#fff;font-weight:800;font-size:14px;padding:4px 11px;border-radius:8px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.6)}
@keyframes mpulse{0%{opacity:.7;transform:translate(-50%,0) scale(.5)}100%{opacity:0;transform:translate(-50%,0) scale(3.8)}}
@media (prefers-reduced-motion:reduce){.marker .ring{animation:none;opacity:.5}.screen{transition:none}}
</style></head><body>

<section id="screenSelect" class="screen">
 <div class="s-head"><div class="brand-row"><button class="brand" id="brandTop"><span class="mark">フロアマップ</span><span class="sub">台を探す</span></button>
  <button class="top-btn" id="topBtn">トップ</button></div>
  <div class="store" id="storeName"></div>
  <div class="lead">レート → 機種 → 台番号 の順に選ぶと、マップで光って案内します</div></div>
 <div class="s-body" id="selBody">
  <div class="lab new-lab" id="newLab" hidden><span class="n" style="background:#22c55e">NEW</span>新台情報</div><div class="rates" id="pkRatesNew"></div>
  <div class="lab"><span class="n">1</span>レートを選ぶ</div><div class="rates" id="pkRates"></div>
  <div id="stepModel" hidden><div class="lab"><span class="n">2</span>機種を選ぶ</div>
   <input class="pk-filter" id="pkFilter" placeholder="機種名で絞り込み" autocomplete="off"><div id="pkModels"></div></div>
  <div id="stepNo" hidden><div class="lab"><span class="n">3</span>台番号を選ぶ</div>
   <div class="nos" id="pkNos"></div><div class="hint">タップするとマップに移動して、その台が光ります</div></div>
  <div class="copyright">© 2026 MONACO PALACE. All Rights Reserved.</div>
 </div>
</section>

<section id="screenMap" class="screen">
 <div class="map-head"><button class="home" id="home">トップ</button>
  <div class="mh-info"><span class="rate-pill" id="mhRate"></span><span class="mh-name" id="mhName"></span><span class="mh-no num" id="mhNo"></span></div>
  <a class="mh-spec" id="mhSpec" href="#" target="_blank" rel="noopener">DMM</a></div>
 <main>
  <div id="stage"><div id="mapwrap"><svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg></div></div>
  <div class="marker" id="marker" hidden><div class="tag" id="mTag"></div><div class="pin"></div><div class="ring"></div></div>
  <button class="home-fab" id="homeFab">← 戻る</button>
  <div class="zoom"><button id="zin">＋</button><button id="zout">−</button><button id="zfit">⊙</button><button id="bgtoggle" title="背景の白黒を切替">◐</button></div>
 </main>
</section>

 facilities.forEach(f=>{xs.push(f.cx-f.w*CW/2,f.cx+f.w*CW/2);ys.push(f.cy-f.h*CH/2,f.cy+f.h*CH/2);});

function clampView(){const vw=stage.clientWidth,vh=stage.clientHeight;
 const W=(ext.x1-ext.x0)*view.s,H=(ext.y1-ext.y0)*view.s;
 const mx=Math.min(vw*0.28,140),my=Math.min(vh*0.22,110);
 if(W<=vw-2*mx){view.tx=(vw-W)/2;}
 else{const lo=mx-W,hi=vw-mx;view.tx=Math.min(hi,Math.max(lo,view.tx));}
 if(H<=vh-2*my){view.ty=(vh-H)/2;}
 else{const lo=my-H,hi=vh-my;view.ty=Math.min(hi,Math.max(lo,view.ty));}}
